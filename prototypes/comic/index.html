<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffd600">
<title>Врушка — Comic</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { min-height:100vh; min-height:100dvh; overflow-x:hidden; }
body {
  font-family: 'Space Grotesk', sans-serif;
  color:#000;
  background: #ffd600;
  background-image:
    radial-gradient(circle at 25% 25%, rgba(0,0,0,0.08) 2px, transparent 2px),
    radial-gradient(circle at 75% 75%, rgba(0,0,0,0.08) 2px, transparent 2px);
  background-size: 24px 24px;
  min-height:100vh; min-height:100dvh;
  user-select:none;
  position:relative;
}
/* Action lines burst */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    repeating-conic-gradient(from 0deg at 50% 40%, transparent 0deg, transparent 8deg, rgba(0,0,0,0.04) 8deg, rgba(0,0,0,0.04) 10deg);
}

.wrap { position:relative; z-index:1; min-height:100vh; min-height:100dvh; padding:24px 20px; display:flex; flex-direction:column; gap:20px; }

/* Top bubble banner */
.top-bubble {
  background:#0066ff; color:#fff;
  border:4px solid #000; border-radius:20px;
  padding:12px 16px; position:relative;
  box-shadow: 6px 6px 0 #000;
  font-family:'Bangers'; letter-spacing:2px;
  transform: rotate(-1.5deg);
}
.top-bubble::after {
  content:''; position:absolute; bottom:-12px; left:40px;
  width:0; height:0; border:12px solid transparent;
  border-top-color:#0066ff; border-bottom:0;
  filter: drop-shadow(0 2px 0 #000);
}
.top-bubble-title { font-size:18px; }
.top-bubble-sub { font-size:14px; opacity:0.9; font-family:'Space Grotesk'; font-weight:500; letter-spacing:0; }

.main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; text-align:center; }

/* Comic hero */
.hero {
  width:200px; height:200px; position:relative;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce { 0%,100% { transform:translateY(0) rotate(-2deg); } 50% { transform:translateY(-10px) rotate(2deg); } }
.hero-burst {
  position:absolute; inset:0;
  background: #e63946;
  clip-path: polygon(50% 0%, 61% 18%, 79% 8%, 75% 28%, 94% 32%, 82% 48%, 100% 55%, 84% 68%, 94% 84%, 73% 82%, 70% 100%, 54% 88%, 42% 100%, 30% 82%, 9% 84%, 18% 68%, 0% 55%, 18% 48%, 6% 32%, 25% 28%, 21% 8%, 39% 18%);
  filter: drop-shadow(5px 5px 0 #000);
}
.hero-face {
  position:absolute; inset:25%;
  background:#ffd600; border:4px solid #000;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:56px;
  box-shadow: inset -6px -6px 0 rgba(0,0,0,0.15);
}

.title-block { position:relative; }
.title-main {
  font-family:'Luckiest Guy';
  font-size:88px; letter-spacing:2px; line-height:0.9;
  color:#fff;
  -webkit-text-stroke: 4px #000;
  text-shadow:
    6px 6px 0 #e63946,
    6px 6px 0 #000;
  transform: rotate(-3deg);
}
.title-sub {
  background:#fff; border:3px solid #000;
  padding:6px 16px; display:inline-block; margin-top:8px;
  font-family:'Bangers'; font-size:18px; letter-spacing:2px;
  transform: rotate(2deg);
  box-shadow: 4px 4px 0 #000;
}

/* POW stickers scattered */
.pow {
  position:absolute; font-family:'Luckiest Guy';
  color:#fff; -webkit-text-stroke:3px #000;
  text-shadow: 4px 4px 0 #000;
  pointer-events:none;
  animation: pulse 1.5s ease infinite alternate;
}
@keyframes pulse { from { transform:scale(1); } to { transform:scale(1.08); } }
.pow-1 { top:90px; right:20px; font-size:36px; color:#ffd600; transform:rotate(15deg); animation-delay:0s; }
.pow-2 { top:240px; left:10px; font-size:28px; color:#ff6b9d; transform:rotate(-12deg); animation-delay:0.3s; }
.pow-3 { bottom:200px; right:30px; font-size:32px; color:#00e676; transform:rotate(8deg); animation-delay:0.6s; }

.buttons { width:100%; max-width:360px; display:flex; flex-direction:column; gap:14px; }

.btn-main {
  background:#e63946; color:#fff;
  border:4px solid #000; border-radius:16px;
  padding:22px; font-family:'Luckiest Guy';
  font-size:32px; letter-spacing:3px; cursor:pointer;
  box-shadow: 8px 8px 0 #000;
  -webkit-text-stroke: 2px #000;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-main:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0 #000; }
.btn-row { display:flex; gap:10px; }
.btn-sec {
  flex:1; background:#fff; color:#000;
  border:3px solid #000; border-radius:14px;
  padding:14px 8px; font-family:'Bangers';
  font-size:18px; letter-spacing:2px; cursor:pointer;
  box-shadow: 5px 5px 0 #000;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-sec:active { transform: translate(2px, 2px); box-shadow: 3px 3px 0 #000; }

/* Overlay */
.overlay {
  position:fixed; inset:0; z-index:100;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  padding:20px; text-align:center;
  background:
    radial-gradient(circle at center, #e63946 0%, #8b0000 100%);
}
.overlay.show { display:flex; animation: zoomin 0.35s cubic-bezier(0.2,1.5,0.5,1); }
@keyframes zoomin { from { transform:scale(0.2); opacity:0; } to { transform:scale(1); opacity:1; } }

.overlay::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background: repeating-conic-gradient(from 0deg at 50% 50%, #ffd600 0deg, #ffd600 5deg, transparent 5deg, transparent 15deg);
  opacity:0.35;
  animation: spin 3s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.comic-panel {
  background:#ffd600; border:6px solid #000;
  border-radius:8px; padding:30px 24px;
  box-shadow: 12px 12px 0 #000;
  position:relative; max-width:300px; width:100%;
  transform: rotate(-2deg);
  z-index:1;
}
.panel-emoji { font-size:80px; margin-bottom:10px; line-height:1; }
.panel-title {
  font-family:'Luckiest Guy'; font-size:52px;
  color:#fff; -webkit-text-stroke: 3px #000;
  text-shadow: 4px 4px 0 #e63946;
  line-height:1;
}
.panel-desc {
  font-family:'Bangers'; font-size:20px; letter-spacing:2px;
  margin-top:12px; color:#000;
}
.pow-big {
  position:absolute; top:-30px; right:-20px;
  font-family:'Luckiest Guy'; font-size:54px;
  color:#ffd600; -webkit-text-stroke:4px #000;
  text-shadow: 6px 6px 0 #000;
  transform: rotate(12deg);
}
.close-btn {
  margin-top:30px; z-index:1; background:#fff; border:3px solid #000;
  color:#000; padding:10px 22px; font-family:'Bangers'; letter-spacing:2px;
  cursor:pointer; border-radius:10px; box-shadow:4px 4px 0 #000;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bubble">
    <div class="top-bubble-title">⚡ ГЛАВА 1 ⚡</div>
    <div class="top-bubble-sub">сегодня вечером... кто-то соврёт!</div>
  </div>

  <span class="pow pow-1">ZAP!</span>
  <span class="pow pow-2">BAM!</span>
  <span class="pow pow-3">WHAM!</span>

  <div class="main">
    <div class="hero">
      <div class="hero-burst"></div>
      <div class="hero-face">🤥</div>
    </div>

    <div class="title-block">
      <div class="title-main">ВРУШКА</div>
      <div class="title-sub">✦ поймай обманщика ✦</div>
    </div>

    <div class="buttons">
      <button class="btn-main" onclick="reveal()">▶ ИГРАТЬ!</button>
      <div class="btn-row">
        <button class="btn-sec">📖 ПРАВИЛА</button>
        <button class="btn-sec">✏️ СВОИ</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="comic-panel">
    <div class="pow-big">BUSTED!</div>
    <div class="panel-emoji">🤥</div>
    <div class="panel-title">ТЫ ВРУШКА!</div>
    <div class="panel-desc">БЛЕФУЙ И НЕ ПОПАДИСЬ!</div>
  </div>
  <button class="close-btn" onclick="close_()">✕ ЗАКРЫТЬ</button>
</div>

<script>
function reveal() { document.getElementById('overlay').classList.add('show'); }
function close_() { document.getElementById('overlay').classList.remove('show'); }
</script>
</body>
</html>
